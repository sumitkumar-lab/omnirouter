<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OmniRouter Research Scientist</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">OmniRouter</p>
          <h1>AI Research Scientist</h1>
        </div>
        <div class="status" id="status">Checking API...</div>
      </section>

      <section class="settings">
        <label for="apiBase">API base URL</label>
        <div class="settings-row">
          <input id="apiBase" type="url" placeholder="http://127.0.0.1:8000" />
          <button id="saveApi" type="button">Save</button>
        </div>
      </section>

      <section class="documents">
        <div class="section-heading">
          <div>
            <h2>Documents</h2>
            <p>Upload PDFs, Markdown sidecars, notes, CSV, or JSON into the research corpus.</p>
          </div>
          <button id="refreshDocs" type="button">Refresh</button>
        </div>
        <form id="uploadForm" class="upload-form">
          <input
            id="documentFiles"
            type="file"
            multiple
            accept=".pdf,.md,.markdown,.txt,.csv,.json"
          />
          <div class="upload-actions">
            <label class="toggle">
              <input id="syncAfterUpload" type="checkbox" checked />
              <span>Sync after upload</span>
            </label>
            <button id="uploadButton" type="submit">Upload</button>
          </div>
        </form>
        <div id="uploadStatus" class="upload-status">No uploads yet.</div>
        <ul id="documentList" class="document-list"></ul>
      </section>

      <section id="chatLog" class="chat-log" aria-live="polite"></section>

      <form id="chatForm" class="composer">
        <textarea
          id="query"
          rows="3"
          placeholder="Ask about an uploaded paper, test a derivation, or request a PyTorch ablation..."
          required
        ></textarea>
        <div class="composer-actions">
          <label class="toggle">
            <input id="useCache" type="checkbox" checked />
            <span>Use cache</span>
          </label>
          <button id="send" type="submit">Send</button>
        </div>
      </form>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
